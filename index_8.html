<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RouteLog">
<title>RouteLog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sidebar-w:260px;
  --navy:#006633;--navy2:#004d26;--navy3:#007a3d;
  --gold:#ffcc00;--gold-light:#fffbe6;
  --red:#ef4444;--green:#22c55e;--blue:#3b82f6;
  --bg:#f1f5f9;--white:#ffffff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;--radius-lg:14px;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);-webkit-font-smoothing:antialiased;color:var(--text);font-size:14px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--navy);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;transition:transform .25s}
.sidebar-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:-.3px}
.logo-text span{color:var(--gold)}
.sidebar-section{padding:12px 10px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px}
.sidebar-routes{flex:1;overflow-y:auto;padding:4px 8px}
.sidebar-routes::-webkit-scrollbar{width:4px}
.sidebar-routes::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.route-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;transition:background .15s;color:rgba(255,255,255,.7);margin-bottom:2px}
.route-item:hover{background:rgba(255,255,255,.07);color:#fff}
.route-item.active{background:rgba(255,255,255,.12);color:#fff}
.route-item-icon{width:32px;height:32px;background:rgba(255,255,255,.08);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.route-item.active .route-item-icon{background:var(--gold);color:var(--navy)}
.route-item-info{flex:1;min-width:0}
.route-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-item-meta{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.sidebar-bottom{padding:12px 8px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-btn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;background:none;border:none;font-family:var(--font);width:100%}
.sidebar-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.sv-mode-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-family:var(--font);width:100%;margin-bottom:6px;text-align:left}
.sv-mode-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.sv-mode-btn.live{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.4);color:#fff}
.sv-label{display:flex;align-items:center;gap:8px}
.sv-status{font-size:10px;font-weight:500;color:rgba(255,255,255,.35);white-space:nowrap}
.sv-mode-btn.live .sv-status{color:#f87171;font-weight:700}
.sv-stop-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:8px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.35);color:#f87171;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font);width:100%;margin-top:2px;transition:all .15s}
.sv-stop-btn:hover{background:rgba(239,68,68,.35)}

/* ── MAIN CONTENT ── */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}

/* ── TOP BAR ── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:1rem;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-badges{display:flex;gap:6px}
.tbadge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.topbar-actions{display:flex;gap:8px}
.btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy2)}
.btn.gold{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.btn.gold:hover{background:#e08e00}
.btn.danger{background:#fef2f2;color:var(--red);border-color:#fecaca}

/* ── VIEW TABS ── */
.view-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;flex-shrink:0}
.vtab{padding:11px 16px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.vtab:hover{color:var(--text)}
.vtab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--navy)}

/* ── SECTION TABS ── */
.section-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.section-bar::-webkit-scrollbar{display:none}
.sec-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;color:var(--muted);font-family:var(--font)}
.sec-tab:hover{border-color:var(--navy);color:var(--navy)}
.sec-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.sec-tab-num{font-size:10px;opacity:.6;font-family:var(--mono)}
.sec-tab-cnt{background:rgba(255,255,255,.2);padding:1px 5px;border-radius:10px;font-size:10px;font-family:var(--mono)}
.sec-tab:not(.active) .sec-tab-cnt{background:var(--bg);color:var(--muted)}

/* ── STOPS TABLE ── */
.table-wrap{flex:1;overflow-y:auto;background:var(--white)}
.stops-table{width:100%;border-collapse:collapse}
.stops-table th{padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;white-space:nowrap}
.stops-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.stops-table tr:hover td{background:#f8fafc;cursor:pointer}
.stops-table tr.dog td{background:#fffbeb;border-left:3px solid var(--gold)}
.stops-table tr.dog:hover td{background:#fef9e0}
.td-num{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;width:40px}
.side-pill{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono)}
.side-L{background:#dbeafe;color:#1d4ed8}
.side-R{background:#dcfce7;color:#15803d}
.side-x{background:var(--bg);color:var(--muted)}
.td-surname{font-weight:700;font-size:13px;line-height:1.3}
.td-names{font-size:12px;color:var(--muted);line-height:1.3}
.td-notes{font-size:12px;color:var(--muted);font-style:italic;line-height:1.4;word-break:break-word}
.td-eir{display:inline-block;background:#f0fdf4;color:#15803d;padding:2px 7px;border-radius:4px;font-size:11px;font-family:var(--mono);border:1px solid #bbf7d0;margin-top:3px}
.alert-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;margin:1px}
.alert-dog{background:#fef3c7;color:#92400e}
.alert-shed{background:#dbeafe;color:#1e40af}
.alert-porch{background:#ede9fe;color:#5b21b6}
.alert-hh{background:#f3e8ff;color:#6b21a8}

/* ── MAP ── */
#map{flex:1;min-height:400px}
.map-overlay{background:var(--white);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:6px;flex-shrink:0}

/* ── VOICE ── */
.voice-panel{flex:1;overflow-y:auto;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px}
.voice-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:28px;width:100%;max-width:480px}
.voice-title{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.voice-route{font-size:12px;color:var(--muted);margin-bottom:20px}
.mode-row{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:3px;margin-bottom:20px;border:1px solid var(--border)}
.mode-btn{flex:1;padding:8px;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.mode-btn.on{background:var(--navy);color:#fff}
.mode-desc{font-size:12px;color:var(--muted);margin-bottom:24px;line-height:1.5;padding:0 4px}
.mic-area{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.mic-button{width:100px;height:100px;border-radius:50%;background:var(--navy);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(15,23,42,.2);margin-bottom:12px}
.mic-button:hover{transform:scale(1.04)}
.mic-button.on{background:var(--red);animation:mPulse 1.2s ease-in-out infinite}
@keyframes mPulse{0%,100%{box-shadow:0 4px 20px rgba(239,68,68,.3)}50%{box-shadow:0 4px 30px rgba(239,68,68,.6);transform:scale(1.04)}}
.mic-label{font-size:13px;color:var(--muted);font-weight:500;text-align:center;min-height:20px}
.mic-label.on{color:var(--red)}
.heard-label{font-size:13px;font-weight:600;text-align:center;min-height:20px;margin-bottom:14px}
.v-result{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-radius:var(--radius);padding:16px;margin-bottom:8px;color:#fff;border:none}
.v-box{font-size:1.8rem;font-weight:800;font-family:var(--mono);color:var(--gold);letter-spacing:-.5px;line-height:1}
.v-stop{font-size:11px;color:rgba(255,255,255,.4);font-family:var(--mono);margin:3px 0 8px}
.v-name{font-size:1.1rem;font-weight:700}
.v-res{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.v-loc{font-size:11px;color:rgba(255,255,255,.35);margin-top:8px;font-family:var(--mono)}
.v-dog{font-size:12px;font-weight:700;color:var(--gold);margin-top:6px}
.v-note{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;font-style:italic}
.no-result{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);padding:14px;text-align:center;color:var(--red);font-size:13px;font-weight:600;margin-bottom:10px}
.search-row{display:flex;gap:8px;margin-top:8px}
.search-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);outline:none;background:#fff;color:var(--text)}
.search-row input:focus{border-color:var(--navy)}
.search-row button{padding:10px 18px;background:var(--navy);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:var(--font);font-size:13px}

/* ── PRINT ── */
.print-view{flex:1;overflow-y:auto;background:var(--white);padding:24px}
.print-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--navy)}
.print-route-name{font-size:1.5rem;font-weight:800}
.print-route-meta{font-size:12px;color:var(--muted);margin-top:3px}
.print-brand{font-size:12px;color:var(--muted);text-align:right;font-family:var(--mono)}
.print-section{margin-bottom:24px}
.print-sec-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.print-box-badge{background:var(--navy);color:var(--gold);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:var(--mono)}
.print-sec-name{font-size:14px;font-weight:700}
.print-sec-count{font-size:11px;color:var(--muted)}
.print-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.print-table th{padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1.5px solid var(--navy);text-align:left;overflow:hidden}
.print-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top;overflow:hidden;word-wrap:break-word}
.print-table tr.dog td{background:#fffbeb}
.print-table tr:hover td{background:var(--bg)}
.print-table .col-num{width:32px}
.print-table .col-side{width:42px}
.print-table .col-surname{width:16%}
.print-table .col-names{width:20%}
.print-table .col-info{width:30%;white-space:normal;word-wrap:break-word}
.print-table .col-alerts{width:52px}

/* ── EDIT MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea,.field select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:13px;outline:none;color:var(--text);background:#fff}
.field input:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{height:72px;resize:none;line-height:1.4}
.field-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-row{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--border);border-radius:7px;cursor:pointer}
.check-row input{width:15px;height:15px;cursor:pointer;accent-color:var(--navy)}
.check-row label{font-size:13px;cursor:pointer;font-weight:500}
.modal-footer{display:flex;gap:8px;margin-top:18px}
.modal-cancel{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;color:var(--text)}
.modal-save{flex:2;padding:10px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:300;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  #hamburger{display:flex!important}
  .topbar-title{font-size:.9rem}
  .topbar-sub{display:none}
  .topbar-badges{display:none}
  .stops-table{display:none}
  .mobile-cards{display:flex!important}
  .view-tabs .vtab[data-tab="map"],.view-tabs .vtab[data-tab="print"]{display:none}
}

/* ── MOBILE CARDS ── */
.mobile-cards{display:none;flex-direction:column;gap:0;flex:1;overflow-y:auto;background:var(--bg);padding:8px}
.stop-card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background .15s;margin-bottom:6px}
.stop-card:active{background:#f8fafc}
.stop-card.dog{background:#fffbeb;border-left:3px solid var(--gold)}
.stop-card-num{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);width:22px;flex-shrink:0;padding-top:1px;text-align:center}
.stop-card-side{flex-shrink:0;padding-top:1px}
.stop-card-body{flex:1;min-width:0}
.stop-card-name{font-size:15px;font-weight:700;line-height:1.2}
.stop-card-residents{font-size:12px;color:var(--muted);margin-top:2px}
.stop-card-note{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px;line-height:1.4}
.stop-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.stop-card-eir{font-size:11px;color:#15803d;font-family:var(--mono);margin-top:3px}

/* ── EMPTY / LOADING ── */
.loading-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;flex:1}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px;flex:1}



/* ── SECTIONS INDEX ── */
.print-sections-index{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:24px}
.print-sections-index-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.print-sections-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 16px}
.print-sections-grid-item{display:flex;align-items:baseline;gap:6px;font-size:12px;padding:3px 0;border-bottom:1px dotted var(--border)}
.print-sections-grid-num{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:18px}
.print-sections-grid-name{font-weight:500;color:var(--text)}
.print-sections-grid-cnt{font-size:10px;color:var(--muted);font-family:var(--mono);margin-left:auto}
/* ── PRINT EDIT MODE ── */
.print-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.edit-mode-toggle{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.edit-mode-toggle.on{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700}
.pe-cell{outline:none;min-width:40px;width:100%;box-sizing:border-box}
.pe-cell:focus{background:#fffbe6;outline:2px solid var(--gold);border-radius:3px;padding:1px 3px}
.edit-mode .print-table td{padding:3px 4px}
.add-stop-row td{background:#f0fdf4;cursor:pointer;color:#15803d;font-size:12px;font-weight:600;text-align:center}
.add-stop-row:hover td{background:#dcfce7}

/* ── FLOATING EDIT BAR ── */
.float-edit-bar{position:fixed;bottom:0;left:var(--sidebar-w);right:0;background:var(--navy);color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.float-edit-bar span{font-size:13px;color:rgba(255,255,255,.7)}
@media(max-width:768px){.float-edit-bar{left:0}}
@media print{.float-edit-bar{display:none!important}}
@media print{.print-toolbar,.edit-mode-toggle{display:none!important}}
@media print{
  .sidebar,.topbar,.view-tabs,.section-bar,.topbar-actions,.btn{display:none!important}
  .content{overflow:visible}
  .print-view{padding:0}
}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📮</div>
      <div class="logo-text">Route<span>Log</span></div>
    </div>
    <div class="sidebar-section">My Routes</div>
    <div class="sidebar-routes" id="sidebar-routes">
      <div style="padding:20px;text-align:center;color:rgba(255,255,255,.3);font-size:13px">Loading...</div>
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-section" style="padding:10px 10px 8px">Voice Mode</div>

function norm(s){
  return(s||'').toLowerCase()
    .replace(/mc\s+(\w)/gi,'mac$1')
    .replace(/mc(\w)/gi,'mac$1')
    .replace(/o'\s*(\w)/gi,'o$1')
    .replace(/o'(\w)/gi,'o$1')
    .replace(/[^a-z0-9 ]/g,' ')
    .replace(/\s+/g,' ')
    .trim()
}
function matches(q,h){
  const w=norm(q).split(' ').filter(Boolean)
  if(!w.length)return false
  const surname=norm(h.surname)
  const names=norm(h.resident_names)

  // Single word search — match against surname OR individual first names
  if(w.length===1){
    const word=w[0]
    // Match surname
    if(surname.includes(word))return true
    // Match any individual first name token
    const nameTokens=names.split(' ').filter(Boolean)
    if(nameTokens.some(t=>t===word||t.includes(word)||word.includes(t)))return true
    return false
  }

  // Multi-word search — ALL words must match this specific person
  // Strategy: each word must appear in either surname or names of THIS person
  // AND at least one word must match surname, at least one must match a name token
  const nameTokens=names.split(' ').filter(Boolean)
  const allMatch=w.every(word=>{
    if(surname.includes(word))return true
    if(nameTokens.some(t=>t===word||t.includes(word)))return true
    return false
  })
  return allMatch
}
function speak(txt){
  if(!window.speechSynthesis)return
  speechSynthesis.cancel()
  // Small delay to ensure cancel is processed
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(txt)
    u.lang='en-IE'
    u.rate=0.85
    u.volume=1
    u.pitch=1
    speechSynthesis.speak(u)
  },100)
}
function sideClass(d){if(!d)return 'x';const u=d.toUpperCase();if(u.startsWith('L'))return 'L';if(u.startsWith('R'))return 'R';return 'x'}
function alertTags(h){
  let t=''
  if(h.has_dog)t+=`<span class="alert-tag alert-dog">🐕 Dog</span>`
  if(h.drop_off_location==='shed')t+=`<span class="alert-tag alert-shed">📦 Shed</span>`

  else if(h.drop_off_location&&h.drop_off_location!=='none')t+=`<span class="alert-tag alert-shed">📦 ${h.drop_off_location}</span>`
  if(h.info==='Holiday Home')t+=`<span class="alert-tag alert-hh">🏖 HH</span>`
  return t
}

async function loadRoute(id){

  const {data:houses}=await sb.from('houses').select('*,sections(name,position,id)').in('section_id',secs.map(s=>s.id)).order('position')
  G.sections=secs||[]
  G.houses=houses||[]

function switchTab(tab){

function renderMapView(container){
  document.getElementById('section-bar').style.display='none'
  const ctrl=document.createElement('div')
  ctrl.className='map-overlay'
  ctrl.innerHTML=`
    <button class="btn active" id="mb-road" onclick="setTile('road',this)">🗺 Road</button>
    <button class="btn" id="mb-sat" onclick="setTile('satellite',this)">🛰 Satellite</button>
    <button class="btn" id="mb-hybrid" onclick="setTile('hybrid',this)">🌍 Hybrid</button>
  `
  const mapDiv=document.createElement('div')
  mapDiv.id='map'
  mapDiv.style.flex='1'
  container.appendChild(ctrl)
  container.appendChild(mapDiv)
  setTimeout(()=>{
    if(G.mapInst){G.mapInst.remove();G.mapInst=null}
    const withCoords=G.houses.filter(h=>h.lat&&h.lng)
    const center=withCoords.length?[withCoords[0].lat,withCoords[0].lng]:[54.95,-8.19]
    const m=L.map('map',{center,zoom:13})
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',maxZoom:19}).addTo(m)
    const colors=['#0f172a','#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4']
    withCoords.forEach(h=>{
      const si=G.sections.findIndex(s=>s.id===h.section_id)
      const color=colors[si%colors.length]
      const icon=L.divIcon({className:'',html:`<div style="background:${color};color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);font-family:sans-serif">${h.position+1}</div>`,iconSize:[30,30],iconAnchor:[15,15]})
      L.marker([h.lat,h.lng],{icon}).addTo(m).bindPopup(`<strong style="font-family:sans-serif;font-size:13px">${h.surname||'Vacant'}</strong><br><span style="font-size:11px;color:#666">${h.resident_names||''}</span>${h.has_dog?'<br><strong style="color:#e67e00;font-size:11px">🐕 Dog</strong>':''}`)
    })
    if(!withCoords.length){
      m.setView([54.95,-8.19],11)
    } else if(withCoords.length>1){
      m.fitBounds(withCoords.map(h=>[h.lat,h.lng]),{padding:[30,30]})
    }
    G.mapInst=m
  },80)
}

window.setTile=function(type,btn){
  document.querySelectorAll('.map-overlay .btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  if(!G.mapInst)return
  G.mapInst.eachLayer(l=>{if(l instanceof L.TileLayer)G.mapInst.removeLayer(l)})
  const urls={road:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',satellite:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',hybrid:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'}
  L.tileLayer(urls[type]||urls.road,{attribution:'© OSM',maxZoom:19}).addTo(G.mapInst)
}

function printRow(stop,i,editMode){
  const note=stop.info&&stop.info!=='Holiday Home'?stop.info:''
  const alerts=(stop.has_dog?'🐕 ':'')+(stop.drop_off_location&&stop.drop_off_location!=='none'?'📦 ':'')+(stop.info==='Holiday Home'?'🏖':'')
  if(!editMode){
    return `<tr class="${stop.has_dog?'dog':''}">
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${i+1}</td>
      <td style="font-family:var(--mono);font-weight:700">${stop.direction||'-'}</td>
      <td><strong>${stop.surname||'Vacant'}</strong>${stop.eircode?`<br><span style="font-size:10px;color:#15803d;font-family:var(--mono)">${stop.eircode}</span>`:''}</td>
      <td style="font-size:11px;color:var(--muted)">${stop.resident_names||''}</td>
      <td style="font-size:11px;color:var(--muted);font-style:italic">${note}</td>
      <td style="font-size:11px">${alerts}</td>
    </tr>`
  }
  return `<tr class="${stop.has_dog?'dog':''}" data-id="${stop.id}">
    <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${i+1}</td>

      onblur="savePrintCell(this,'direction','plain')">${stop.direction||''}</span></td>
    <td><span class="pe-cell" contenteditable="true" data-id="${stop.id}"
      onblur="savePrintCell(this,'surname','surname')">${stop.surname||''}</span>
      ${stop.eircode?`<br><span class="pe-cell" contenteditable="true" data-id="${stop.id}" style="font-size:10px;color:#15803d;font-family:var(--mono)" onblur="savePrintCell(this,'eircode','upper')">${stop.eircode}</span>`:''}</td>
    <td><span class="pe-cell" contenteditable="true" data-id="${stop.id}"
      onblur="savePrintCell(this,'resident_names','names')">${stop.resident_names||''}</span></td>
    <td><span class="pe-cell" contenteditable="true" data-id="${stop.id}"
      onblur="savePrintCell(this,'info','plain')">${note}</span></td>
    <td style="font-size:11px">${alerts}</td>
  </tr>`
}

window.togglePrintEdit=function(){

    document.getElementById('float-edit-bar')?.remove()

window.savePrintCell=async function(el,field,type){
  const id=parseInt(el.dataset.id)
  let val=el.innerText.trim()
  if(type==='surname')val=normSurname(val)
  else if(type==='names')val=normResidents(val)
  else if(type==='upper')val=val.toUpperCase()
  el.innerText=val
  const {error}=await sb.from('houses').update({[field]:val}).eq('id',id)
  if(error){el.style.outline='2px solid red';return}
  el.style.outline=''
  const h=G.houses.find(x=>x.id===id)
  if(h)h[field]=val
}

window.addStop=async function(sectionId){
  const sec=G.sections.find(s=>s.id===sectionId)
  if(!sec)return
  const pos=G.houses.filter(h=>h.section_id===sectionId).length
  const {data,error}=await sb.from('houses').insert({
    section_id:sectionId,route_id:G.route.id,
    position:pos,surname:'',resident_names:'',direction:'',has_dog:false
  }).select()
  if(error){alert('Could not add stop: '+error.message);return}
  if(data?.[0])G.houses.push({...data[0],sections:sec})
  renderTab()
}

// ── NAME NORMALISER ──
function capWord(w){
  if(!w)return ''
  return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()
}
function normSurname(s){
  if(!s)return ''
  s=s.trim()
  // Handle hyphenated surnames: Smith-Jones
  if(s.includes('-')){
    return s.split('-').map(p=>normSurname(p.trim())).join('-')
  }
  // Handle multiple surnames separated by space (e.g. "de Búrca" keep de lowercase)
  const lo=s.toLowerCase()
  // O'Brien / O Brien
  if(/^o[' ]/.test(lo)){
    const rest=s.slice(lo.startsWith("o'")?2:2).trim()
    return "O'"+capWord(rest)
  }
  // MacDonnell / Mac Donnell
  if(lo.startsWith('mac')&&lo.length>3){
    const rest=s.slice(3).trim()
    return 'Mac'+capWord(rest)
  }
  // McDonnell / Mc Donnell
  if(lo.startsWith('mc')&&lo.length>2){
    const rest=s.slice(2).trim()
    return 'Mc'+capWord(rest)
  }
  // de Búrca, van X — keep prefix lowercase
  const loPrefixes=['de ','van ','di ','le ']
  for(const pre of loPrefixes){
    if(lo.startsWith(pre)){
      return pre.trimEnd()+' '+capWord(s.slice(pre.length))
    }
  }
  return capWord(s)
}
function normResidents(s){
  if(!s)return ''
  // Split on: comma, plus, ampersand, " and ", slash
  const parts=s.split(/[,+&\/]|and/i)
    .map(p=>p.trim())
    .filter(Boolean)
    .map(p=>{
      // Each part may be a first name — title case each word
      return p.split(/\s+/).map(w=>{
        // Handle hyphenated first names: Mary-Anne
        if(w.includes('-'))return w.split('-').map(capWord).join('-')
        return capWord(w)
      }).join(' ')
    })
  return parts.join(', ')
}
function normHouseName(s){
  if(!s)return ''
  return s.trim().split(/\s+/).map(capWord).join(' ')
}

window.saveStop=async function(id){
  const btn=document.querySelector('.modal-save')
  if(btn){btn.textContent='Saving...';btn.disabled=true}
  const isHH=document.getElementById('e-hh')?.checked||false
  const upd={
    direction:(document.getElementById('e-side')?.value.trim()||'').toUpperCase().replace(/^([LR])\s*\d*/,'$1').trim()||document.getElementById('e-side')?.value.trim()||'',
    surname:normSurname(document.getElementById('e-surname')?.value||''),
    resident_names:normResidents(document.getElementById('e-names')?.value||''),
    info:isHH?'Holiday Home':(document.getElementById('e-info')?.value.trim()||''),
    eircode:(document.getElementById('e-eir')?.value.trim()||'').toUpperCase(),
    house_name:normHouseName(document.getElementById('e-housename')?.value||''),
    drop_off_location:document.getElementById('e-drop')?.value||'none',
    has_dog:document.getElementById('e-dog')?.checked||false
  }
  // Auto-lookup Eircode if missing and coords exist
  const hForEc=G.houses.find(x=>x.id===id)
  if(!upd.eircode&&hForEc?.lat&&hForEc?.lng){
    const ec=await lookupEircode(hForEc.lat,hForEc.lng)
    if(ec)upd.eircode=ec
    const eirInput=document.getElementById('e-eir')
    if(eirInput&&ec)eirInput.value=ec
  }
  try{
    const {error}=await sb.from('houses').update(upd).eq('id',id)
    if(error){
      alert('Save failed: '+error.message)
      if(btn){btn.textContent='Save Changes';btn.disabled=false}
      return
    }
    const idx=G.houses.findIndex(h=>h.id===id)
    if(idx>=0)G.houses[idx]={...G.houses[idx],...upd}
    closeModal()
    renderTab()
  }catch(e){
    alert('Error saving: '+e.message)
    if(btn){btn.textContent='Save Changes';btn.disabled=false}
  }
}

window.normaliseAll=async function(){
  if(!G.route)return
  const count=G.houses.length
  if(!confirm(`Normalise all ${count} names on this route?\n\nThis will fix capitalisation and formatting for every stop.`))return
  const btn=document.querySelector('[onclick="normaliseAll()"]')
  if(btn){btn.textContent='✨ Fixing...';btn.disabled=true}
  let fixed=0,errors=0
  for(const h of G.houses){
    const ns=normSurname(h.surname||'')
    const nr=normResidents(h.resident_names||'')
    const nh=normHouseName(h.house_name||'')
    const ne=(h.eircode||'').toUpperCase().trim()
    if(ns===h.surname&&nr===h.resident_names&&nh===h.house_name&&ne===h.eircode)continue
    const {error}=await sb.from('houses').update({
      surname:ns,resident_names:nr,house_name:nh,eircode:ne
    }).eq('id',h.id)
    if(!error){
      h.surname=ns;h.resident_names=nr;h.house_name=nh;h.eircode=ne
      fixed++
    } else {errors++}
  }
  if(btn){btn.textContent='✨ Fix Names';btn.disabled=false}
  alert(`Done! ${fixed} stops updated.${errors?` ${errors} errors.`:''}`)
  renderTab()
}

window.doVSearch=function(q){
  if(!q?.trim())return
  const lbl=document.getElementById('heard-lbl')
  if(lbl)lbl.innerHTML=`Heard: <strong>"${q}"</strong>`
  const found=G.houses.filter(h=>matches(q,h))
  const el=document.getElementById('v-res')
  if(!el)return
  if(!found.length){
    el.innerHTML=`<div class="no-result">No match found for "${q}"</div>`
    speak(`No match found for ${q}`)
    return
  }
  el.innerHTML=found.map(h=>`<div class="v-result">
    <div class="v-box">📦 Box ${(h.sections?.position||0)+1}</div>
    <div class="v-stop">Stop ${h.position+1}</div>
    <div class="v-name">${h.surname||''}</div>
    ${h.resident_names?`<div class="v-res2" style="font-size:12px;color:rgba(255,255,255,.55);margin-top:2px">${h.resident_names}</div>`:''}
    <div class="v-loc">📍 ${h.sections?.name||''} ${h.eircode?`· ${h.eircode}`:''}</div>
    ${h.has_dog?`<div class="v-dog">🐕 DOG WARNING</div>`:''}
    ${h.info&&h.info!=='Holiday Home'?`<div class="v-note">📝 ${h.info}</div>`:''}
    ${h.drop_off_location&&h.drop_off_location!=='none'?`<div class="v-note">📦 Leave at: ${h.drop_off_location}</div>`:''}
  </div>`).join('')
  const speech=found.map(h=>`${h.surname}, Box ${(h.sections?.position||0)+1}, Stop ${h.position+1}${h.has_dog?', dog warning':''}`).join('. ')
  speak(speech)
}

window.toggleMic=function(){
  if(G.recog){
    G.autoR=false;G.recog.stop();G.recog=null
    document.getElementById('mic-btn')?.classList.remove('on')
    if(document.getElementById('mic-ico'))document.getElementById('mic-ico').textContent='🎤'
    if(document.getElementById('mic-lbl')){document.getElementById('mic-lbl').textContent='Tap to start';document.getElementById('mic-lbl').classList.remove('on')}
    return
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){alert('Voice search requires Chrome browser');return}
  speechSynthesis?.cancel()
  const r=new SR()
  r.lang='en-IE';r.continuous=false;r.interimResults=false;r.maxAlternatives=3
  r.onstart=()=>{
    document.getElementById('mic-btn')?.classList.add('on')
    if(document.getElementById('mic-ico'))document.getElementById('mic-ico').textContent='⏹'
    if(document.getElementById('mic-lbl')){document.getElementById('mic-lbl').textContent='🔴 Listening...';document.getElementById('mic-lbl').classList.add('on')}
  }
  r.onresult=e=>{
    const txt=e.results[0][0].transcript
    const vi=document.getElementById('v-txt')
    if(vi)vi.value=txt
    doVSearch(txt)
    G.recog=null
    document.getElementById('mic-btn')?.classList.remove('on')
    if(document.getElementById('mic-ico'))document.getElementById('mic-ico').textContent='🎤'
    if(document.getElementById('mic-lbl')){document.getElementById('mic-lbl').textContent=`"${txt}"`;document.getElementById('mic-lbl').classList.remove('on')}
    updateSidebarVoice()
    if(G.autoR&&G.mode==='sort')setTimeout(()=>{if(G.autoR)toggleMic()},1800)
  }
  r.onerror=r.onend=()=>{
    G.recog=null
    document.getElementById('mic-btn')?.classList.remove('on')
    if(document.getElementById('mic-ico'))document.getElementById('mic-ico').textContent='🎤'
    if(document.getElementById('mic-lbl'))document.getElementById('mic-lbl').classList.remove('on')
  }
  G.recog=r
  if(G.mode==='sort')G.autoR=true
  r.start()
}

// ── EIRCODE / GEOCODING ──
const GKEY='AIzaSyCB_ZFID2TrpbROpCF6YvQfDLxZDkusjBw'

async function lookupEircode(lat,lng){
  try{
    const r=await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GKEY}&language=en&region=ie`)
    const d=await r.json()
    if(d.status!=='OK')return null
    for(const res of d.results){
      for(const comp of res.address_components){
        if(comp.types.includes('postal_code')){
          const ec=comp.long_name.replace(/\s+/g,' ').trim().toUpperCase()
          // Irish Eircodes are 7 chars (A65 F4E2) or 8 with space
          if(/^[A-Z0-9]{3}\s?[A-Z0-9]{4}$/.test(ec))return ec
        }
      }
    }
    return null
  }catch(e){return null}
}

window.fillAllEircodes=async function(){
  const missing=G.houses.filter(h=>!h.eircode&&h.lat&&h.lng)
  if(!missing.length){alert('All stops with coordinates already have Eircodes!');return}
  if(!confirm(`Look up Eircodes for ${missing.length} stops?\n\nThis uses Google Maps — may take a moment.`))return
  const btn=document.getElementById('fill-eircodes-btn')
  if(btn){btn.textContent='⏳ Looking up...';btn.disabled=true}
  let found=0,notFound=0
  for(const h of missing){
    const ec=await lookupEircode(h.lat,h.lng)
    if(ec){
      const {error}=await sb.from('houses').update({eircode:ec}).eq('id',h.id)
      if(!error){h.eircode=ec;found++}
    }else{notFound++}
    // Small delay to avoid rate limiting
    await new Promise(r=>setTimeout(r,120))
  }
  if(btn){btn.textContent='🗺 Fill Eircodes';btn.disabled=false}
  alert(`Done!\n✅ ${found} Eircodes found\n❌ ${notFound} not found (no coordinates or not in Google Maps)`)
  renderTab()
}

window.importEircodes=async function(){
  if(!G.route){alert('Please load the Ranafast route first');return}
  const btn=document.getElementById('import-eir-btn')
  if(btn){btn.textContent='⏳ Importing...';btn.disabled=true}
  
  let matched=0, skipped=0, errors=0
  
  for(const [secPos, secHint, stopPos, surnameHint, eircode] of EIRCODE_IMPORT_DATA){
    // Find section by position
    const sec=G.sections.find(s=>s.position===secPos)
    if(!sec){skipped++;continue}
    
    // Find house by position within section
    const secHouses=G.houses.filter(h=>h.section_id===sec.id).sort((a,b)=>a.position-b.position)
    const house=secHouses[stopPos]
    if(!house){skipped++;continue}
    
    // Skip if already has an eircode
    if(house.eircode&&house.eircode.trim()){skipped++;continue}
    
    // Update
    const {error}=await sb.from('houses').update({eircode}).eq('id',house.id)
    if(!error){
      house.eircode=eircode
      matched++
    } else {errors++}
    
    await new Promise(r=>setTimeout(r,50))
  }
  
  if(btn){btn.textContent='📥 Import Eircodes';btn.disabled=false}
  alert(`Eircode Import Complete!\n✅ ${matched} updated\n⏭ ${skipped} skipped (already have eircode or not found)\n❌ ${errors} errors`)
  renderTab()
}

init()
</script>
